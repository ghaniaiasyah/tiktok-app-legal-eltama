<script>
  const appsScriptUrl = "https://script.google.com/macros/s/AKfycbyT9is3DM2BL9lG4hrzdew0YtbeJESV40ld1ifz-PAv-IHvw8F-9y49WLhyra2IOx8Iww/exec";

  const params = new URLSearchParams(window.location.search);
  const state = params.get("state") || "";

  let platform = "";

  if (state.startsWith("tiktok|")) {
    platform = "tiktok";
  } else if (state.startsWith("linkedin|")) {
    platform = "linkedin";
  }

  if (platform) {
    params.set("platform", platform);
  }

  window.location.href = appsScriptUrl + "?" + params.toString();
</script>
