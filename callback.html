<script>
  const tiktokScriptUrl = "https://script.google.com/macros/s/AKfycbyuGoCYCi9eGb-K3L9xHuLFYd8qzfQdB8H-bKqbAgclgn5tI_1UY0z0gLFjgsQMBChk4Q/exec";
  const linkedinScriptUrl = "https://script.google.com/macros/s/AKfycbyLSkiXVWU_JESKRLWWWp3ambBR9pReehAoIklyqwwb9t_6ol16uX1VURhn2Wjtpj6n/exec";

  const params = new URLSearchParams(window.location.search);
  const state = params.get("state") || "";

  let targetUrl = "";

  if (state.startsWith("tiktok|")) {
    targetUrl = tiktokScriptUrl;
  } else if (state.startsWith("linkedin|")) {
    targetUrl = linkedinScriptUrl;
  }

  if (!targetUrl) {
    document.body.innerHTML = "<p>Unknown callback state.</p>";
  } else {
    window.location.href = targetUrl + "?" + params.toString();
  }
</script>
